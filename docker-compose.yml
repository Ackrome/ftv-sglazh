services:
  api:
    build:
      context: .
      args:
        FTV_INSTALL_GPU: ${FTV_INSTALL_GPU:-0}
    command: uvicorn ftv_smoothing.app_server:app --host 0.0.0.0 --port 8765
    ports:
      - "8765:8765"
    environment:
      FTV_APP_HOST: 0.0.0.0
      FTV_APP_PORT: 8765
      FTV_INPUT_NC: /data/relief_masked.nc
      FTV_RESULTS_DIR: /data/artifacts/app-results
      FTV_JOBS_DB: /data/artifacts/app-results/jobs.sqlite3
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FTV_LOG_LEVEL: INFO
    volumes:
      - ./:/data
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        FTV_INSTALL_GPU: ${FTV_INSTALL_GPU:-0}
    command: celery -A ftv_smoothing.worker.celery_app worker --loglevel=INFO --concurrency=1 --queues=cpu --hostname=cpu@%h
    environment:
      FTV_INPUT_NC: /data/relief_masked.nc
      FTV_RESULTS_DIR: /data/artifacts/app-results
      FTV_JOBS_DB: /data/artifacts/app-results/jobs.sqlite3
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FTV_LOG_LEVEL: INFO
    volumes:
      - ./:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  flower:
    build:
      context: .
      args:
        FTV_INSTALL_GPU: ${FTV_INSTALL_GPU:-0}
    command: celery -A ftv_smoothing.worker.celery_app flower --address=0.0.0.0 --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped
